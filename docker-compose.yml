# ============================================
# Halo 博客系统 Docker Compose 配置文件
# 项目：https://github.com/my-name-bin/halo-ops
# 版本：v2.2（标准化结构版）
# 描述：编排 Halo 博客系统的所有服务（应用、数据库、反向代理）
# ============================================
services:

  # ==========================================
  # Halo 主应用服务
  # 功能：博客系统核心，处理所有业务逻辑
  # ==========================================
  halo:
    image: halohub/halo:2.24.0
    container_name: halo-app
    restart: unless-stopped
    depends_on:
      halodb:
        condition: service_healthy
    networks:
      - halo_network
    volumes:
      - ./data/app:/root/.halo2
    deploy:
      resources:
        limits:
          cpus: '${HALO_CPU_LIMIT:-1.0}'
          memory: '${HALO_MEM_LIMIT:-512m}'
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    environment:
      - JVM_OPTS=-Xmx${HALO_JVM_XMX} -Xms${HALO_JVM_XMS} -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError
    command:
      - --spring.r2dbc.url=r2dbc:pool:postgresql://halodb/${DB_NAME}
      - --spring.r2dbc.username=${DB_USER}
      - --spring.r2dbc.password=${DB_PASSWORD}
      - --spring.sql.init.platform=postgresql
      - --halo.external-url=${HALO_EXTERNAL_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
        labels: 'service'
        env: 'HALO'
    dns:
      - 8.8.8.8
      - 114.114.114.114
    stop_grace_period: 30s
    labels:
      - "com.halo.service=halo"
      - "com.halo.version=2.24.0"
      - "com.halo.environment=production"

  # ==========================================
  # PostgreSQL 数据库服务
  # 功能：存储 Halo 的所有数据
  # ==========================================
  halodb:
    image: postgres:15.4
    container_name: halo-database
    restart: unless-stopped
    networks:
      - halo_network
    volumes:
      - ./db/data:/var/lib/postgresql/data
      - ./config/database/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      # 注意：pg_hba.conf 不再提前挂载，将在初始化后通过 entrypoint 脚本处理
    deploy:
      resources:
        limits:
          cpus: '${POSTGRES_CPU_LIMIT:-1.0}'
          memory: '${POSTGRES_MEM_LIMIT:-512m}'
    tmpfs:
      - /tmp
      - /var/run/postgresql
    security_opt:
      - no-new-privileges:true
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
      - PGUSER=${DB_USER}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'
        labels: 'service'
        env: 'POSTGRES'
    dns:
      - 8.8.8.8
      - 114.114.114.114
    stop_grace_period: 60s
    labels:
      - "com.halo.service=database"
      - "com.halo.version=15.4"
      - "com.halo.environment=production"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 4096
        hard: 4096
    shm_size: '128mb'

  # ==========================================
  # Nginx 反向代理服务
  # 功能：处理 HTTPS、反向代理、SSL 终端
  # ==========================================
  nginx:
    image: nginx:1.27-alpine
    container_name: halo-nginx
    restart: unless-stopped
    depends_on:
      halo:
        condition: service_healthy
    networks:
      - halo_network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/sites-available:/etc/nginx/sites-available:ro
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/mime.types:/etc/nginx/mime.types:ro
      - ./ssl/live/gb.aace.cc:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    deploy:
      resources:
        limits:
          cpus: '${NGINX_CPU_LIMIT:-0.5}'
          memory: '${NGINX_MEM_LIMIT:-128m}'
    tmpfs:
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "nginx", "-t", "-s", "quit"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
        labels: 'service'
        env: 'NGINX'
    dns:
      - 8.8.8.8
      - 114.114.114.114
    stop_grace_period: 5s
    labels:
      - "com.halo.service=nginx"
      - "com.halo.version=1.27-alpine"
      - "com.halo.environment=production"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

# ============================================
# 网络配置
# 功能：容器间安全通信，网络隔离
# ============================================
networks:
  halo_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
