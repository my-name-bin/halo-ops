# ============================================
# Halo 博客系统 Nginx 配置文件
# 项目：https://gb.aace.cc/
# 功能：HTTP 重定向、HTTPS 终止、反向代理到 Halo 应用
# ============================================

# ==========================================
# HTTP 服务器配置（端口 80）
# 功能：
#   1. 处理 Let's Encrypt ACME 验证请求
#   2. 将其他所有 HTTP 请求重定向到 HTTPS
# ==========================================
server {
    # 监听 IPv4 80 端口
    listen 80;

    # 匹配的域名
    server_name gb.aace.cc;

    # ========================================
    # ACME 挑战路径配置
    # Let's Encrypt 证书申请/续期时验证域名所有权
    # ========================================
    location /.well-known/acme-challenge/ {
        # ACME 验证文件存放目录
        root /usr/share/nginx/html;
        # 找不到文件返回 404
        try_files $uri =404;
    }

    # ========================================
    # 强制 HTTPS 重定向
    # ========================================
    location / {
        # 301 永久重定向到 HTTPS
        # $host：请求的主机名
        # $request_uri：完整的请求 URI（包含查询参数）
        return 301 https://$host$request_uri;
    }
}

# ==========================================
# HTTPS 服务器配置（端口 443）
# 功能：
#   1. SSL/TLS 加密终止
#   2. HTTP/2 协议支持
#   3. 反向代理到 Halo 应用
# ==========================================
server {
    # SSL 监听 443 端口
    listen 443 ssl;

    # 启用 HTTP/2 协议：多路复用提升性能
    http2 on;

    # 服务器域名
    server_name gb.aace.cc;

    # ========================================
    # SSL 证书配置
    # ========================================
    # 证书链文件（服务器证书 + 中间证书）
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    # 私钥文件
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # ========================================
    # SSL 协议与加密配置
    # ========================================
    # 允许的 TLS 版本（禁用不安全的 TLSv1.0/1.1 和 SSL）
    ssl_protocols TLSv1.2 TLSv1.3;
    # 加密套件：高强度加密，禁用不安全的算法
    ssl_ciphers HIGH:!aNULL:!MD5;
    # 优先使用服务器加密套件顺序
    ssl_prefer_server_ciphers on;

    # ========================================
    # SSL Session 配置
    # ========================================
    # Session 缓存：共享内存存储会话信息，提升 HTTPS 性能
    ssl_session_cache shared:SSL:10m;
    # Session 超时时间
    ssl_session_timeout 1d;
    # 禁用 Session Ticket：增强安全性（每次需要重新握手）
    ssl_session_tickets off;

    # ========================================
    # 安全响应头
    # ========================================
    # HSTS：强制使用 HTTPS，1 年有效期，包含子域名
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # 防止点击劫持：禁止页面被 iframe 嵌入
    add_header X-Frame-Options "SAMEORIGIN" always;
    # 防止 MIME 类型嗅探：强制浏览器按声明的内容类型处理
    add_header X-Content-Type-Options "nosniff" always;
    # XSS 防护：启用浏览器 XSS 过滤
    add_header X-XSS-Protection "1; mode=block" always;
    # Referrer 策略：控制 Referer 头发送策略
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ========================================
    # 请求大小限制
    # ========================================
    # 最大请求体大小：允许上传 100MB 的文件（文章图片、附件等）
    client_max_body_size 100M;

    # ========================================
    # 反向代理配置
    # ========================================
    location / {
        # 代理到 Halo 应用（Docker Compose 服务名）
        proxy_pass http://halo:8090;

        # ========================================
        # 代理请求头配置
        # 让后端获取真实客户端信息
        # ========================================
        # Host 头：传递原始请求主机名
        proxy_set_header Host $host;
        # 真实客户端 IP
        proxy_set_header X-Real-IP $remote_addr;
        # 代理链 IP 列表
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 原始协议（http/https）
        proxy_set_header X-Forwarded-Proto $scheme;

        # ========================================
        # 代理超时配置
        # ========================================
        # 建立连接超时
        proxy_connect_timeout 60s;
        # 发送请求到后端超时
        proxy_send_timeout 60s;
        # 读取后端响应超时
        proxy_read_timeout 60s;

        # ========================================
        # 代理缓冲配置
        # 减少后端压力，提升大文件传输效率
        # ========================================
        # 启用响应缓冲
        proxy_buffering on;
        # 缓冲区大小
        proxy_buffer_size 4k;
        # 缓冲区数量和大小
        proxy_buffers 8 4k;
        # 忙碌时缓冲区大小
        proxy_busy_buffers_size 8k;

        # ========================================
        # HTTP/1.1 长连接配置
        # ========================================
        # 使用 HTTP/1.1 协议
        proxy_http_version 1.1;
        # 清除 Connection 头
        proxy_set_header Connection "";
    }
}
