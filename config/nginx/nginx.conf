# Nginx 主配置文件
# 用于 Nginx 反向代理服务器的全局配置

# ============================================
# 基本运行配置
# ============================================

# Nginx worker 进程运行用户
user  nginx;

# worker 进程数量：auto 表示自动设置为 CPU 核心数
worker_processes  auto;
    worker_rlimit_nofile 65535;

# 错误日志配置
# 路径：/var/log/nginx/error.log
# 级别：debug | info | notice | warn | error | crit
error_log  /var/log/nginx/error.log notice;

# PID 文件路径：存储主进程 PID
pid        /run/nginx.pid;


# ============================================
# 事件模块配置
# ============================================

events {
    # 单个 worker 进程的最大并发连接数
    # 1024：中等并发配置
    # 最大连接数 = worker_processes * worker_connections
    worker_connections  2048;
}


# ============================================
# HTTP 模块配置
# ============================================

http {
    # 引入 MIME 类型配置（文件扩展名与媒体类型映射）
    include       /etc/nginx/mime.types;

    # 默认文件类型：无法识别时使用此类型
    default_type  application/octet-stream;

    # 日志格式定义

    # 标准日志格式（main）
    # 包含：客户端IP、用户、时间、请求、状态码、字节数、来源、UA、代理IP
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # JSON 日志格式
    # 适用于日志收集系统（如 ELK、 Loki）分析
    log_format  json  '{"time":"$time_local",'
                      '"remote_addr":"$remote_addr",'
                      '"host":"$host",'
                      '"request":"$request",'
                      '"status":$status,'
                      '"body_bytes_sent":$body_bytes_sent,'
                      '"http_referer":"$http_referer",'
                      '"http_user_agent":"$http_user_agent"}';

    # 访问日志配置：使用标准格式记录到 access.log
    access_log  /var/log/nginx/access.log  main;

    # ========================================
    # 性能优化配置
    # ========================================

    # 启用 sendfile：高效的文件传输方式（内核空间直接拷贝）
    sendfile        on;

    # tcp_nopush：配合 sendfile 使用，在发送完整 HTTP 响应头后再发送数据
    # 减少网络包数量，优化 TCP 传输效率
    tcp_nopush      on;

    # tcp_nodelay：禁用 Nagle 算法，减少延迟
    # 适用于实时性要求高的场景（如 SSH、游戏服务器）
    tcp_nodelay     on;

    # ========================================
    # 超时配置
    # ========================================

    # keepalive 超时：长连接保持时间
    keepalive_timeout  65;

    # 发送响应超时：服务器发送数据到客户端的最大时间
    send_timeout       60;

    # 读取请求头超时：客户端发送请求头到服务器的最大等待时间
    client_header_timeout  60;

    # 读取请求体超时：客户端发送请求体到服务器的最大等待时间
    client_body_timeout   60;

    # ========================================
    # 安全与性能优化
    # ========================================

    # MIME 类型哈希表大小：影响内容类型查找性能
    # 2048：足够大多数场景使用
    types_hash_max_size 2048;

    # 隐藏 Nginx 版本号：防止攻击者针对特定版本漏洞攻击
    server_tokens off;

    # ========================================
    # Gzip 压缩配置
    # ========================================

    # 启用 Gzip 压缩：减少 60-70% 传输量，节省带宽
    gzip on;

    # 向响应添加 Vary: Accept-Encoding 头
    # 告诉缓存服务器根据压缩状态缓存不同版本
    gzip_vary on;

    # 对所有代理请求启用压缩（包括后端返回的内容）
    gzip_proxied any;

    # 压缩级别：1-9，6 是平衡点（压缩率与 CPU 开销）
    gzip_comp_level 6;

    # 压缩的文件类型：文本和 Web 资源压缩效果最佳
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript
               image/svg+xml font/woff font/woff2;

    # 最小压缩长度：小于此值的响应不压缩
    gzip_min_length 256;

    # 禁用压缩的用户代理：IE 6 以下版本不支持或有问题
    gzip_disable "MSIE [1-6]\.";

    # 引入其他配置文件（虚拟主机配置）
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-available/*.conf;
}
